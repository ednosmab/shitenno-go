name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  # id-token: write  # TODO: uncomment when npm publish is enabled

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - run: corepack enable
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          # registry-url: https://registry.npmjs.org  # TODO: uncomment when npm publish is enabled
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: pnpm test

      # Verify tag matches package.json version
      - name: Verify tag matches package.json
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag ($TAG) != package.json version ($PKG_VERSION)"
            exit 1
          fi

      # TODO: uncomment when ready to publish to npm
      # - name: Publish to npm
      #   run: npm publish --provenance --access public
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.0.6
        with:
          generate_release_notes: true
          files: dist/*
